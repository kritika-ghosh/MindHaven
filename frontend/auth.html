<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MindHaven - Authenticate</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="css/styles.css" rel="stylesheet"/>
    <!-- Three.js and GSAP for premium animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Tailwind Configuration -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6b38d4",
                        "secondary": "#6f46b9",
                        "background": "#fcf9f8",
                        "on-background": "#1c1b1b",
                        "surface": "#fcf9f8",
                        "on-surface": "#1c1b1b",
                        "on-surface-variant": "#494454",
                        "primary-container": "#8455ef",
                        "on-primary": "#ffffff"
                    },
                    spacing: {
                        "margin-mobile": "20px",
                        "margin-desktop": "64px",
                        "container-max": "1280px"
                    },
                    fontFamily: {
                        "body-md": ["Plus Jakarta Sans"],
                        "title-md": ["Plus Jakarta Sans"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md overflow-x-hidden min-h-screen relative flex items-center justify-center p-4">
    <!-- WebGL Background Canvas -->
    <canvas id="webgl-bg"></canvas>

    <!-- Global Background Elements -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="floating-sphere w-[500px] h-[500px] -top-24 -left-24 opacity-30"></div>
        <div class="floating-sphere w-[400px] h-[400px] top-1/2 -right-20 opacity-20" style="animation-delay: -5s;"></div>
        <div class="floating-sphere w-[300px] h-[300px] bottom-1/4 left-1/3 opacity-25" style="animation-delay: -12s;"></div>
    </div>

    <!-- Page Transition Overlay -->
    <div id="page-transition-overlay"></div>

    <!-- Main Auth Card -->
    <div class="w-full max-w-md glass-card rounded-[40px] p-8 relative md:p-10 border-white/50 shadow-2xl flex flex-col items-center select-none" id="auth-container">
        
        <!-- Header Logo and 3D Canvas -->
        <div class="flex flex-col items-center gap-3 text-center mb-8 w-full">
            <div class="canvas-3d-container w-28 h-28 relative flex items-center justify-center cursor-grab active:cursor-grabbing">
                <canvas class="absolute inset-0 w-full h-full"></canvas>
                <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary absolute z-10 pointer-events-none shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">psychology</span>
                </div>
            </div>
            <div>
                <h1 class="font-title-md text-2xl font-extrabold tracking-tight text-on-surface">Welcome to MindHaven</h1>
                <p class="text-xs text-on-surface-variant font-semibold mt-1" id="auth-subtitle">Verify your identity to begin neural assessment</p>
            </div>
        </div>

        <!-- Sliding Forms Wrap -->
        <div class="w-full relative overflow-hidden h-[340px]" id="forms-wrapper">
            <!-- Form 1: Sign In -->
            <form id="signin-form" class="w-full space-y-5 absolute top-0 left-0 transition-transform duration-500 ease-out" onsubmit="handleAuthSubmit(event, 'signin')">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-on-surface-variant/80 uppercase tracking-widest pl-1" for="signin-email">Secure ID (Email)</label>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-4 text-on-surface-variant text-[20px]">alternate_email</span>
                        <input class="w-full pl-12 pr-4 py-3.5 rounded-2xl glass-input text-sm font-semibold border-white/40 focus:ring-2 focus:ring-primary/20" id="signin-email" placeholder="name@domain.com" required type="email"/>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between items-center pl-1">
                        <label class="text-xs font-bold text-on-surface-variant/80 uppercase tracking-widest" for="signin-password">Access Cipher</label>
                        <a class="text-xs font-bold text-primary hover:underline" href="#">Forgot Cipher?</a>
                    </div>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-4 text-on-surface-variant text-[20px]">lock</span>
                        <input class="w-full pl-12 pr-4 py-3.5 rounded-2xl glass-input text-sm font-semibold border-white/40 focus:ring-2 focus:ring-primary/20" id="signin-password" placeholder="••••••••" required type="password"/>
                    </div>
                </div>

                <div class="flex items-center pl-1">
                    <input class="rounded text-primary focus:ring-primary/20 border-white/40 bg-white/20 w-4 h-4 cursor-pointer" id="remember-me" type="checkbox"/>
                    <label class="text-xs font-bold text-on-surface-variant/80 ml-2 cursor-pointer" for="remember-me">Establish persistent connection</label>
                </div>

                <button class="w-full pill-3d py-4 text-white font-bold text-sm rounded-2xl flex items-center justify-center gap-2 group mt-2" type="submit">
                    <span class="material-symbols-outlined text-[18px]">verified_user</span>
                    Verify Identity
                </button>
            </form>

            <!-- Form 2: Sign Up (Initally translated out) -->
            <form id="signup-form" class="w-full space-y-5 absolute top-0 left-0 transition-transform duration-500 ease-out translate-x-full" onsubmit="handleAuthSubmit(event, 'signup')">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-on-surface-variant/80 uppercase tracking-widest pl-1" for="signup-name">Full Name</label>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-4 text-on-surface-variant text-[20px]">person</span>
                        <input class="w-full pl-12 pr-4 py-3.5 rounded-2xl glass-input text-sm font-semibold border-white/40 focus:ring-2 focus:ring-primary/20" id="signup-name" placeholder="John Doe" type="text"/>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-on-surface-variant/80 uppercase tracking-widest pl-1" for="signup-email">Secure ID (Email)</label>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-4 text-on-surface-variant text-[20px]">alternate_email</span>
                        <input class="w-full pl-12 pr-4 py-3.5 rounded-2xl glass-input text-sm font-semibold border-white/40 focus:ring-2 focus:ring-primary/20" id="signup-email" placeholder="name@domain.com" type="email"/>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-on-surface-variant/80 uppercase tracking-widest pl-1" for="signup-password">Configure Cipher</label>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-4 text-on-surface-variant text-[20px]">lock_reset</span>
                        <input class="w-full pl-12 pr-4 py-3.5 rounded-2xl glass-input text-sm font-semibold border-white/40 focus:ring-2 focus:ring-primary/20" id="signup-password" placeholder="At least 8 characters" type="password"/>
                    </div>
                </div>

                <button class="w-full pill-3d py-4 text-white font-bold text-sm rounded-2xl flex items-center justify-center gap-2 group mt-2" type="submit">
                    <span class="material-symbols-outlined text-[18px]">add_circle</span>
                    Initialize Node Account
                </button>
            </form>
        </div>

        <!-- Footer Toggle Area -->
        <div class="w-full border-t border-white/20 mt-6 pt-4 text-center">
            <p class="text-xs text-on-surface-variant font-bold" id="toggle-container">
                New subject node? 
                <button class="text-primary hover:underline ml-1 font-extrabold focus:outline-none" onclick="toggleAuthMode('signup')" type="button">Initialize Account</button>
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/3d-elements.js"></script>
    <script>
        // Entrance animation with GSAP
        gsap.from("#auth-container", {
            duration: 1.2,
            opacity: 0,
            y: 40,
            ease: "power4.out"
        });

        // Form toggle logic
        let currentMode = 'signin';
        const signinForm = document.getElementById('signin-form');
        const signupForm = document.getElementById('signup-form');
        const authSubtitle = document.getElementById('auth-subtitle');
        const toggleContainer = document.getElementById('toggle-container');
        const wrapper = document.getElementById('forms-wrapper');

        function toggleAuthMode(mode) {
            currentMode = mode;
            if (mode === 'signup') {
                signinForm.classList.add('-translate-x-full');
                signupForm.classList.remove('translate-x-full');
                authSubtitle.textContent = "Establish a new secure mental evaluation node";
                toggleContainer.innerHTML = 'Already registered? <button class="text-primary hover:underline ml-1 font-extrabold focus:outline-none" onclick="toggleAuthMode(\'signin\')" type="button">Verify credentials</button>';
                // Increase form wrapper height for name field
                gsap.to(wrapper, {height: 340, duration: 0.3});
            } else {
                signinForm.classList.remove('-translate-x-full');
                signupForm.classList.add('translate-x-full');
                authSubtitle.textContent = "Verify your identity to begin neural assessment";
                toggleContainer.innerHTML = 'New subject node? <button class="text-primary hover:underline ml-1 font-extrabold focus:outline-none" onclick="toggleAuthMode(\'signup\')" type="button">Initialize Account</button>';
                gsap.to(wrapper, {height: 270, duration: 0.3});
            }
        }
        
        // Handle Submit and slide out transition
        function handleAuthSubmit(event, mode) {
            event.preventDefault();
            
            // Store a mock session
            localStorage.setItem('mindhaven_auth', 'true');
            localStorage.setItem('mindhaven_user', mode === 'signup' ? document.getElementById('signup-name').value || 'Subject-01' : 'Subject-01');

            // Play transition
            const overlay = document.getElementById('page-transition-overlay');
            overlay.style.pointerEvents = 'all';
            
            gsap.to(overlay, {
                opacity: 1, 
                duration: 0.6,
                onComplete: () => {
                    window.location.href = "assess.html";
                }
            });
        }

        // Adjust wrapper height initially
        document.addEventListener('DOMContentLoaded', () => {
            wrapper.style.height = '270px';
        });
    </script>
</body>
</html>
